# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Overview: https://sveltiacms.app/en/docs/backends
# Github: https://sveltiacms.app/en/docs/backends/github
backend:
  # Comment out github and uncomment test-repo for local tests.
  # Testing: https://sveltiacms.app/en/docs/backends/test
  # name: test-repo
  name: github
  repo: ecompjr/pj-labelu
  branch: main
  auth_methods:
    - oauth
    - token

# === Localization settings

# For now, Svelia does not supports multiple languages,
# but you can set the locale for the admin interface.
# I already submited my interest in adding Brazilian Portuguese translations.
# So let's wait this feature be done.
# Ref.: https://github.com/sveltia/sveltia-cms/issues/724
#
# locale: pt-BR

# === Files & Media configuration

# Media: https://sveltiacms.app/en/docs/media/internal#top-level-configuration
media_folder: "src/assets/images"
public_folder: "src/assets/images"

app_title: LABELU
logo:
  src: /pj-labelu/assets/logo-labelu-header.png
  show_in_header: true

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"
  trim: true
  lowercase: true
  timezone: utc
  maxlength: 64

# === Content collections configuration

# Collections: https://sveltiacms.app/en/docs/collections
# Fields: https://sveltiacms.app/en/docs/fields
# How-to: https://sveltiacms.app/en/docs/how-tos
collections:
  - name: team
    label: Equipe
    folder: src/content/equipe
    create: true
    identifier_field: fullname
    thumbnail: profile

    sortable_fields:
      - fullname

    view_groups:
      groups:
        - name: roles
          field: role
          label: Cargo
      default: year

    fields:
      - label: Nome Completo
        name: fullname
        widget: string

      - label: Cargo no laboratório
        name: role
        widget: select
        required: true
        options:
          - Coordenador
          - Coordenadora
          - Vice-Coordenador
          - Vice-Coordenadora
          - Analista
          - Estagiária
          - Estagiário
          - Pesquisador
          - Pesquisadora

      - label: Lattes
        name: lattes
        widget: string
        prefix: "https://lattes.cnpq.br/"

      - label: ORCID
        name: orcid
        widget: string
        required: false
        prefix: "https://orcid.org/"

      - label: LinkedIn
        name: linkedin
        widget: string
        required: false
        prefix: "https://linkedin.com/in/"

      - label: Perfil
        name: profile
        widget: image
        required: false

      - label: Resumo
        name: body
        widget: markdown

  - name: schedule
    label: Agenda
    folder: src/content/agenda
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"

    sortable_fields:
      fields: ["date", "title"]
      default:
        field: "date"
        direction: "descending"

    fields:
      - label: Titulo
        name: title
        widget: string
        minlength: 3

      - label: Categoria
        name: category
        widget: string
        hint: "Ex: Publicação de Artigo, Seminário, Defesa de Tese"
        required: true

      - label: Pauta
        name: agenda
        widget: text
        maxlength: 300
        hint: "Breve descrição do evento (máx. 300 caracteres)"

      - label: Data
        name: date
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: Hora
        name: time
        widget: string
        required: false
        pattern: ["^\\d{2}:\\d{2}$", "Formato esperado: HH:MM (ex: 14:30)"]

      - label: Local
        name: local
        widget: string
        required: false
        hint: "Sala, auditório ou link para evento online"

      - label: Detalhes
        name: body
        widget: markdown

  - name: archive
    label: "Grupos de Acervo"
    folder: "src/content/acervo"
    create: true
    slug: "{{slug}}"
    fields:
      - label: Título
        name: title
        widget: string

      - label: Imagem de Capa
        name: coverImage
        widget: image
        required: false

      - label: Texto Alternativo (Acessibilidade)
        name: altText
        widget: string
        required: false
        hint: "Breve descrição da imagem para leitores de tela"

      - label: Descrição
        name: body
        widget: markdown
        
  - name: research
    label: Pesquisas
    folder: src/content/pesquisas
    create: true
    identifier_field: title
    summary: "{{title}} ({{startYear}}-{{endYear}})"

    sortable_fields:
      fields:
        - endYear
        - title
      default:
        field: endYear
        direction: descending

    fields:
      - label: Título da Pesquisa
        name: title
        widget: string
        minlength: 5

      - label: Linha de Pesquisa
        name: line
        widget: relation
        collection: research_lines
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]

      - label: Ano de Início
        name: startYear
        widget: number
        value_type: int
        required: false

      - label: Ano de Conclusão
        name: endYear
        widget: number
        value_type: int
        required: false

      - label: Ementa
        name: summary
        widget: markdown

      - label: Publicação
        name: publication
        widget: string
        required: false
        prefix: "https://"
        hint: "Link para PDF ou artigo publicado"

      - label: Pesquisadores
        name: researchers
        widget: relation
        collection: team
        search_fields: ["fullname"]
        value_field: "{{slug}}"
        display_fields: ["fullname"]
        multiple: true
        required: false

      - label: Detalhes
        name: body
        widget: markdown

  - name: research_lines
    label: "Linhas de Pesquisa"
    folder: "src/content/linhas-de-pesquisa"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    sortable_fields:
      - title

    fields:
      - label: Título
        name: title
        widget: string

      - label: Descrição
        name: body
        widget: markdown

  - name: productions
    label: "Produções"
    folder: "src/content/producoes"
    create: true
    slug: "{{year}}-{{slug}}"
    identifier_field: reference
    summary: "{{reference}} ({{year}})"

    sortable_fields:
      fields:
        - year
        - reference
      default:
        field: year
        direction: descending

    fields:
      - label: Referência Bibliográfica (ABNT)
        name: reference
        widget: string
        hint: "Referência completa no formato ABNT"
        minlength: 10

      - label: Ano
        name: year
        widget: number
        value_type: int
        min: 1900
        max: 2100

      - label: Autores Associados
        name: authors
        widget: relation
        collection: team
        search_fields: ["fullname"]
        value_field: "{{slug}}"
        display_fields: ["fullname"]
        multiple: true
        required: false

      - label: Descrição
        name: body
        widget: markdown
        required: false
