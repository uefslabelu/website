# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Overview: https://sveltiacms.app/en/docs/backends
# Github: https://sveltiacms.app/en/docs/backends/github
backend:
  name: github
  repo: ecompjr/pj-labelu
  branch: main


# === Localization settings

locale: pt


# === Files & Media configuration

# Stored files
media_folder: "src/assets/images"
# Uploaded media
public_folder: "src/assets/images"


# === Content collections configuration

# Collections: https://decapcms.org/docs/collection-folder/
collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true 
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Featured Image", name: "heroImage", widget: "image" }
      - { label: "Rating (scale of 1-5)", name: "rating", widget: "number" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "pesquisadores"
    label: "Pesquisadores"
    folder: "src/content/pesquisadores"
    create: true
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "researcher" }
      - { label: "Nome completo", name: "name", widget: "string" }
      - { label: "Cargo no laboratório", name: "position", widget: "string", required: false }
      - label: "Nível acadêmico"
        name: "academicLevel"
        widget: "select"
        options:
          - { label: "Graduação", value: "Graduação" }
          - { label: "Mestrado", value: "Mestrado" }
          - { label: "Doutorado", value: "Doutorado" }
          - { label: "Pós-doutorado", value: "Pós-doutorado" }
          - { label: "Outro", value: "Outro" }
      - { label: "Lattes", name: "lattes", widget: "string" }
      - { label: "ORCID", name: "orcid", widget: "string", required: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Resumo", name: "summary", widget: "text" }
