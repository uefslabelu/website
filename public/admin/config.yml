# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Overview: https://sveltiacms.app/en/docs/backends
# Github: https://sveltiacms.app/en/docs/backends/github
backend:
  # Comment out github and uncomment test-repo for local tests.
  # Testing: https://sveltiacms.app/en/docs/backends/test
  # name: test-repo
  name: github
  repo: ecompjr/pj-labelu
  branch: main


# === Localization settings

# For now, Svelia does not supports multiple languages, 
# but you can set the locale for the admin interface.
# I already submited my interest in adding Brazilian Portuguese translations. 
# So let's wait this feature be done.
# Ref.: https://github.com/sveltia/sveltia-cms/issues/724
# 
# locale: pt-BR


# === Files & Media configuration

# Media: https://sveltiacms.app/en/docs/media/internal#top-level-configuration
media_folder: "src/assets/images"
public_folder: "src/assets/images"

# === Content collections configuration

# Collections: https://sveltiacms.app/en/docs/collections
# Fields: https://sveltiacms.app/en/docs/fields
# How-to: https://sveltiacms.app/en/docs/how-tos
collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true 
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Featured Image", name: "heroImage", widget: "image" }
      - { label: "Rating (scale of 1-5)", name: "rating", widget: "number" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "pesquisadores"
    label: "Pesquisadores"
    folder: "src/content/pesquisadores"
    create: true
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "researcher" }
      - { label: "Nome completo", name: "name", widget: "string" }
      - label: Cargo no laboratório
        name: position
        widget: select
        required: true
        options:
          - Coordenador
          - Coordenadora
          - Vice-Coordenador
          - Vice-Coordenadora
          - Analista
          - Estagiária
          - Estagiário
          - Pesquisador
          - Pesquisadora
      - label: Lattes
        name: lattes
        widget: string
        prefix: "https://lattes.cnpq.br/"
      - label: ORCID
        name: orcid
        widget: string
        required: false
        prefix: "https://orcid.org/"
      - label: LinkedIn
        name: linkedin
        widget: string
        required: false
        prefix: "https://linkedin.com/in/"
      - label: Perfil
        name: profile
        widget: image
        required: false
      - { label: "Resumo", name: "summary", widget: "text" }
  - name: "agenda"
    label: "Agenda"
    folder: "src/content/agenda"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{titulo}} — {{data}}"
    sortable_fields:
      fields: ["data", "titulo"]
      default:
        field: "data"
        direction: "descending"
    fields:
      - { label: "Título do Evento", name: "titulo", widget: "string",
          minlength: 3 }
      - { label: "Categoria", name: "categoria", widget: "string",
          minlength: 2,
          hint: "Ex: Publicação de Artigo, Seminário, Defesa de Tese" }
      - { label: "Pauta", name: "pauta", widget: "text",
          maxlength: 300,
          hint: "Breve descrição do evento (máx. 300 caracteres)" }
      - { label: "Data", name: "data", widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hora", name: "hora", widget: "string", required: false,
          pattern: ["^\\d{2}:\\d{2}$", "Formato esperado: HH:MM (ex: 14:30)"] }
      - { label: "Local", name: "local", widget: "string", required: false,
          hint: "Sala, auditório ou link para evento online" }
      - { label: "Detalhes", name: "body", widget: "markdown" }
